name: "La Taverne Maudite"
theme: "fantasy"
description: "Une aventure dans une taverne hantée."
start_scene: "entree_taverne"

scenes:
  entree_taverne:
    description: |
      Tu entres dans une taverne sombre. L'odeur de bière rance flotte dans l'air.
      Le barman te regarde avec méfiance.
    choices:
      - text: "Parler au barman"
        next_scene: "barman"
      - text: "Chercher un voleur discret"
        next_scene: "voleur"
        condition: { variable: "reputation", operator: ">", value: 50 }
        cost: { resource: "or", value: -10 }

  barman:
    description: |
      Le barman essuie un verre. "Qu'est-ce que tu veux, étranger ?"
    choices:
      - text: "Demander une bière"
        next_scene: "biere"
      - text: "Demander des infos sur les monstres"
        next_scene: "rumeur_monstres"
        condition: { variable: "charisme", operator: ">=", value: 12 }

  voleur:
    description: "Un homme aux yeux fuyants murmure : 'Psst... Tu cherches quelque chose ?'"
    choices:
      - text: "Lui demander de l'aide pour voler le barman"
        next_scene: "vol_barman"
      - text: "L'ignorer"
        next_scene: "entree_taverne"

  biere:
    description: "Tu bois une bière tiède. Rien de spécial."
    choices:
      - text: "Retourner à l'entrée"
        next_scene: "entree_taverne"

  rumeur_monstres:
    description: |
      Le barman baisse la voix : "Des gens disparaissent la nuit... On dit que c'est un vampire."
    choices:
      - text: "Enquêter sur le vampire"
        next_scene: "enquete_vampire"
      - text: "Rire et retourner à ta bière"
        next_scene: "biere"

  vol_barman:
    description: "Le voleur sourit : 'Le barman a une cassette sous le comptoir.'"
    choices:
      - text: "Oui, fais-le !"
        next_scene: "vol_reussi"
        cost: { resource: "or", value: -20 }
      - text: "Non, trop risqué."
        next_scene: "entree_taverne"

  vol_reussi:
    description: "Le voleur te tend 50 pièces d'or !"
    choices:
      - text: "Retourner à l'entrée"
        next_scene: "entree_taverne"
        cost: { resource: "or", value: 50 }

  enquête_vampire:
    description: "Tu suis des traces de pas menant à une crypte..."
    choices: []